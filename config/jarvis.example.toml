[daemon]
name = "jarvisd"
host = "127.0.0.1"
port = 41741
log_level = "INFO"
# jarvisd.log rotation (FIX-11). Caps the always-on daemon log at
# log_max_bytes per file, keeping log_backup_count rotated files.
# Default ceiling ≈ 60 MiB (1 active + 5 backups × 10 MiB).
# Set log_max_bytes = 0 to disable rotation.
log_max_bytes = 10485760
log_backup_count = 5

[database]
path = "~/.jarvis/jarvis.db"

[brain]
default_adapter = "claude_cli"
default_model = "claude-sonnet-5"
timeout_seconds = 60
context_budget_chars = 24000
provider_sessions_are_memory = false

[brain.claude_cli]
enabled = true
command = "claude"
args = ["-p"]
stream_args = [
  "--output-format", "stream-json",
  "--verbose",
  "--include-partial-messages",
]
model = "claude-sonnet-5"
timeout_seconds = 180

[brain.codex_cli]
enabled = true
command = "codex"
args = []
timeout_seconds = 180

# Uncomment to use Claude CLI Warm (persistent process, requires new session for changes):
# [brain.claude_cli_warm]
# enabled = true
# command = "claude"
# args = ["-p"]
# model = "claude-sonnet-5"
# timeout_seconds = 180

[memory]
enabled = false
max_active_blocks = 50
max_context_chars = 12000
worker_candidates_require_promotion = true
# Dev/local explicit enablement only. Keep compiled memory context disabled in
# shared/default configs; [memory].enabled must also remain true for it to run.
compiled_context_enabled = false
compiled_context_max_items = 3
compiled_context_max_chars = 1200
compiled_context_include_procedural = false

[voice]
enabled = true
speak_responses = false
broker_enabled = false
default_tts = "supertonic"
default_stt = "mlx_whisper"
ptt_mode = "hold"
ptt_hotkey = "right_cmd+right_shift"
queue_persisted = true
recorder = "sox"

# Warm serve (ported from DAN 2026-07-08). Empty url = CLI-only (model reloads
# ~0.64s per chunk). Set the url to POST synthesis to a warm `supertonic serve`
# (model loaded once). autostart=true spawns the server if none answers; leave
# false to manage it externally. Falls back to CLI on any server failure.
supertonic_serve_url = ""            # e.g. "http://127.0.0.1:7788"
supertonic_serve_model = "supertonic-3"
supertonic_serve_autostart = false
supertonic_serve_max_chunk_length = 400

# Per-persona mastering (ffmpeg timbre chain, ported from DAN). Empty = raw
# supertonic. "bastard" = Jarvis (the ziomek voice, less bass); also "gritty",
# "clean". Fail-safe: any ffmpeg error plays the raw chunk.
mastering_profile = ""               # e.g. "clean" (warm default) or "bastard"
mastering_binary = "ffmpeg"

# Optional per-persona voice + mastering override (persona.profile -> voice /
# mastering profile). Jarvis ships with ONE persona, so these maps are normally
# empty and every utterance rides supertonic_voice / mastering_profile above.
# Left here as a documented hook; add entries only if you reintroduce profiles.
# [voice.persona_voices]
# [voice.persona_mastering]

# Anglicisms spoken Polish-phonetically before synthesis (data, not code;
# longest key wins, case-insensitive, keeps PL inflections). Ported from DAN's
# _PL_PHONETIC. The panel/logs keep the original spelling — only speech changes.
[voice.tts_pronunciations]
markdown = "markdałn"
python = "pajton"
commit = "komit"
supertonic = "supertonik"
backend = "bekend"
frontend = "frontend"
update = "apdejt"
deploy = "diploj"
merge = "merdż"
branch = "brancz"
release = "rilis"
rollback = "rolbek"
debug = "dibag"
whisper = "łisper"
bug = "bag"
runtime = "rantajm"
stateless = "stejtles"
streaming = "striming"
request = "rikłest"
response = "rispons"
endpoint = "endpojnt"
gateway = "gejtłej"
feature = "ficzer"
token = "tołken"
cache = "kesz"
queue = "kju"
default = "difolt"
review = "riwju"
prefetch = "prifecz"
timeout = "tajmałt"
hardcode = "hardkod"
config = "konfig"
thread = "tred"
serve = "serw"
fallback = "folbek"
chunker = "czanker"
latency = "lejtensi"
barge = "bardż"
worktree = "łorktri"
spike = "spajk"
health = "helf"
loudnorm = "laudnorm"
daemon = "dimon"
broker = "brołker"
orchestrator = "orkestrejtor"
schema = "skima"
override = "ołwerajd"
session = "seszyn"
worker = "łorker"
