[daemon]
name = "jarvisd"
host = "127.0.0.1"
port = 41741
log_level = "INFO"
# jarvisd.log rotation (FIX-11). Caps the always-on daemon log at
# log_max_bytes per file, keeping log_backup_count rotated files.
# Default ceiling ≈ 60 MiB (1 active + 5 backups × 10 MiB).
# Set log_max_bytes = 0 to disable rotation.
log_max_bytes = 10485760
log_backup_count = 5

[database]
path = "~/.jarvis/jarvis.db"

[brain]
default_adapter = "claude_cli"
default_model = "sonnet"
timeout_seconds = 120
context_budget_chars = 24000
provider_sessions_are_memory = false

[brain.claude_cli]
enabled = true
command = "claude"
args = ["-p"]
model = "claude-sonnet-5"
timeout_seconds = 180

[brain.codex_cli]
enabled = true
command = "codex"
args = []
model = "gpt-5.5"
timeout_seconds = 180

[memory]
enabled = true
max_active_blocks = 50
max_context_chars = 12000
worker_candidates_require_promotion = true
# Dev/local explicit enablement only. Keep compiled memory context disabled in
# shared/default configs; [memory].enabled must also remain true for it to run.
compiled_context_enabled = false
compiled_context_max_items = 3
compiled_context_max_chars = 1200
compiled_context_include_procedural = false

[voice]
enabled = true
speak_responses = true
broker_enabled = true
default_tts = "supertonic"
default_stt = "mlx_whisper"
ptt_mode = "hold"
queue_persisted = true
# Fillers: Polish voice fillers played while brain is thinking.
# Configured as array of strings - cycles through them.
fillers = [
  "Już sprawdzam...",
  "Sekundę, myślę...",
  "Daj chwilę, analizuję...",
  "Moment, sprawdzam...",
  "Zaraz to sprawdzę...",
]
filler_after_ms = 300
# Supertonic TTS settings (decree §7.3). Speed 1.35 is clean for >=24 char
# sentences at G4 live gate (2026-07-02). Short sentences (<=24 chars) use
# short_sentence_speed=1.0 to avoid final-phoneme clipping above ~1.15.
supertonic_speed = 1.35
supertonic_short_sentence_chars = 24
supertonic_short_sentence_speed = 1.0
supertonic_voice = "M1"
supertonic_lang = "pl"
supertonic_steps = 14

[audio]
enabled = true
input_policy = "pin_builtin_mic"
preferred_input = "Mikrofon (MacBook Air)"
output_policy = "follow_system_default"
allow_bluetooth_microphone = true
always_listen_enabled = false

[panel]
enabled = true
api_base_url = "http://127.0.0.1:41741"
width = 420
height = 620

[security]
localhost_only = true
require_approval_for_shell = false
require_approval_for_file_write = false
require_approval_for_network = false
destructive_tools_enabled = true
# File-tool containment roots. Voice + auto_approve work within these paths.
# Empty = fail-closed (daemon home only). Set your workspace root(s) here.
approved_roots = ["~/Documents/dev"]
# Voice auto-approval: VOICE_COMMAND gets ALLOW for mutation tools within approved_roots.
# Requires approved_roots to be non-empty. Turn on for voice-first workflows.
voice_auto_approve_tools = true
# Auto-approve mode for model-originated tools (like Codex/Claude CLI).
# Options: "off" (default), "model" (auto-approve model-originated tools in trusted scopes/approved roots),
# "voice" (same as voice_auto_approve_tools), "all" (auto-approve all non-destructive tools).
# When enabled, tools are approved AND executed automatically in one turn.
auto_approve_mode = "model"
# Trusted scopes: model-originated tools auto-approved within these paths.
# Configure in [security.trusted_scopes] as array of tables.
# trusted_scopes = [
#   { name = "jarvis-dev", path = "~/Documents/dev/jarvis", tools = ["file_read", "file_write"], ttl_minutes = 60 }
# ]

[runtime]
home = "~/.jarvis"
logs_dir = "~/.jarvis/logs"
runtime_dir = "~/.jarvis/runtime"
pid_file = "~/.jarvis/runtime/jarvisd.pid"
legacy_detection = "report_only"

[launchd]
enabled = false
label = "com.ozzy.jarvisd"
install_automatically = false