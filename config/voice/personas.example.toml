# ─────────────────────────────────────────────────────────────────────────────
# GŁOSY PERSON — kto jakim głosem gada. Wspólne dla WSZYSTKICH systemów:
# Jarvis daemon, DAN, skille (standup). Sąsiad: pronunciations.toml (wymowa).
#
# voice     = kod głosu supertonica (M1..M5 męskie, F1..F5 damskie)
# mastering = profil ffmpeg: "clean" | "bastard" | "gritty" | "raw" (=surowy)
# speed     = tempo mowy (0.8–1.6)
#
# Zmiana tutaj = zmiana wszędzie. Brak pliku → każdy system jedzie na swoich
# wbudowanych mapach (zero regresji). Wersjonowany wzór: repo → config/voice/.
# ─────────────────────────────────────────────────────────────────────────────

[jarvis]
voice = "M2"          # Ozzy A/B 2026-07-08: „numer 2" = M2
mastering = "bastard"   # „wariant 2" = clean, bez sztucznych pauz
speed = 1.35

[dan]
voice = "M3"
mastering = "bastard"     # Ozzy: „DAN jak było" — surowy, bez masteringu
speed = 1.25

[danusia]
voice = "F3"
mastering = "bastard"
speed = 1.3
