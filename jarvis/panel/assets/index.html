<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jarvis Cockpit</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="chat" data-state="offline">
    <div class="state-frame" aria-hidden="true"></div>
    <main class="cockpit" aria-label="Jarvis cockpit">
      <div class="views">
        <!-- CZAT: jedyny widok domyślny — rozmowa na całej powierzchni. -->
        <section id="view-chat" class="view active" aria-label="Rozmowa">
          <header class="chat-toolbar">
            <select id="conversationSelect" aria-label="Rozmowa"></select>
            <button id="newConversationButton" type="button" class="ghost" title="Nowa rozmowa">+</button>
            <button id="refreshAllButton" type="button" class="ghost" title="Odśwież wszystko">&#8635;</button>
          </header>
          <button id="approvalNudge" type="button" class="approval-nudge" hidden></button>
          <div id="turnList" class="chat-log" aria-label="Przebieg rozmowy"></div>
          <form id="textForm" class="composer">
            <div class="composer-row">
              <textarea
                id="textInput"
                rows="2"
                placeholder="Napisz do Jarvisa…"
                title="Enter wysyła • Shift+Enter = nowa linia"
              ></textarea>
              <button id="sendButton" type="submit" class="primary">Wyślij</button>
            </div>
            <div class="composer-status">
              <span id="voiceStatus" class="hud-item" aria-live="polite">
                <span class="wave" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
                <span id="voiceStatusText">…</span>
              </span>
            </div>
          </form>
          <pre id="historyError" class="error-box" hidden></pre>
          <pre id="inputError" class="error-box" hidden></pre>
          <pre id="voiceError" class="error-box" hidden></pre>
        </section>

        <!-- ZGODY: pełnoekranowy widok przerywnika — tu zapadają decyzje. -->
        <section id="view-approvals" class="view" aria-label="Zgody na narzędzia">
          <div id="approvalList" class="list"></div>
          <pre id="approvalsError" class="error-box" hidden></pre>
        </section>
      </div>

      <!-- Pasek zakładek: Czat + Zgody -->
      <nav class="tabbar" aria-label="Widoki panelu">
        <button type="button" class="tab-button active" data-view="chat" aria-selected="true">
          Czat
        </button>
        <button type="button" class="tab-button" data-view="approvals" aria-selected="false">
          Zgody
          <span id="approvalsBadge" class="approvals-badge" hidden aria-live="polite"></span>
        </button>
      </nav>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
