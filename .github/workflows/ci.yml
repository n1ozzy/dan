name: CI

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check dan tests

  tests:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall dan
      - run: python -m pytest -q
      - run: python -m pytest tests/test_project_rules.py -q
      - run: python -m pytest tests/test_smoke_script.py -q

  smoke:
    needs: [tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - smoke-text-runtime.sh
          - smoke-tools-approvals.sh
          - smoke-file-read.sh
          - smoke-stream.sh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: bash scripts/${{ matrix.script }}
