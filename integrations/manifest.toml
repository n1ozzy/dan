# DAN Release 1 host integration decision manifest (Task 11).
#
# One row per producer frozen from the private Task 1 inventory
# (~/.dan/migration/release1-source-manifest.json, producers surface,
# plus the plan's explicit minimum rows). Producer ids are pinned in
# integrations/inventory-producers.json; tests/test_adapter_contracts.py
# proves 1:1 coverage and that no row is a pending decision.
#
# status: migrated  - behavior continues through the product (destination says where)
#         disabled  - a tested decision to stop; dead paths stay dead
#         rejected  - explicitly not product-owned (external hosts stay external)

schema_version = 1
inventory_snapshot = "integrations/inventory-producers.json"

[notes]
dobranocka_dan_prefix = "Persona routing is ONLY explicit --as; a textual 'DAN:' prefix in dobranocka lines is spoken content unless the ONE documented importer (feeder rezyseria tag 'persona;...|text') already routed it. No implicit second router exists in any adapter. Regression: tests/test_adapter_contracts.py::test_dobranocka_dan_prefix_stays_spoken_content."
per_request_engine = "Traced to a real reader: the old broker consumed req['engine'] (voice_broker.py _prep_request -> _choose_engine) and dan_core/say.py filled it from DAN_BROKER_ENGINE, so the field was CONSUMED, not a no-op. The product intentionally drops per-request engine: engine choice is owned by the VoiceResolver snapshot. No lying compatibility export is provided."
legacy_processes = "Live legacy processes (old broker, jarvisd :41800) are observed only; stopping/disabling them is journaled cutover work in Task 12/14, not Task 11."

